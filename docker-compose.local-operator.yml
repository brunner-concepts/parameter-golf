services:
  operator:
    build:
      context: .
      dockerfile: ops/nissanbox/Dockerfile
    working_dir: /workspace/parameter-golf
    command:
      - python3
      - scripts/control_plane_daemon.py
      - --policy
      - 11_RUN_CONTROL/control_plane/operator_policy.json
      - --state-root
      - 11_RUN_CONTROL/control_plane/state
      - --dashboard-host
      - 0.0.0.0
      - --dashboard-port
      - "8787"
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      RUN_NOTIFY_WEBHOOK_URL: ${RUN_NOTIFY_WEBHOOK_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - .:/workspace/parameter-golf
      - ${RUNPOD_HOME:-$HOME/.runpod}:/root/.runpod:ro
    restart: unless-stopped
